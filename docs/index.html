<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stage314 Public Verification</title>
</head>
<body>

<h1>Stage314 Public Verification</h1>

<h2>Decision</h2>
<pre id="decision">Loading...</pre>

<h2>Signature</h2>
<pre id="signature">Loading...</pre>

<h2>Verify Command</h2>
<pre>gpg --verify decision.json.sig decision.json</pre>

<script>
fetch('decision.json')
  .then(r => r.ok ? r.text() : "ERROR: decision.json not found")
  .then(t => document.getElementById('decision').textContent = t);

fetch('decision.json.sig')
  .then(r => r.ok ? r.text() : "ERROR: signature not found")
  .then(t => document.getElementById('signature').textContent = t);
</script>

</body>
</html>
